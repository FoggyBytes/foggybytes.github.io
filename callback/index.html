<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChargeVault · Tesla</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
       background:#111;color:#eee;font-family:system-ui,Segoe UI,sans-serif}
  .card{max-width:560px;width:90%;background:#1b1b1b;border:1px solid #2a2a2a;border-radius:14px;padding:28px}
  h1{font-size:18px;margin:0 0 4px}
  p{color:#aaa;font-size:14px;line-height:1.5}
  code{display:block;background:#0e0e0e;border:1px solid #2a2a2a;border-radius:8px;padding:14px;
       margin:14px 0;word-break:break-all;font-size:13px;color:#22c55e}
  button{background:#22c55e;color:#06210f;border:0;border-radius:8px;padding:10px 18px;
         font-weight:600;cursor:pointer;font-size:14px}
  button:active{opacity:.8}
  .err{color:#ef4444}
</style>
</head>
<body>
  <div class="card">
    <h1>ChargeVault · collegamento Tesla</h1>
    <div id="ok" style="display:none">
      <p>Copia questo codice e incollalo in ChargeVault (Impostazioni → Tesla):</p>
      <code id="code"></code>
      <button onclick="copyCode()">Copia codice</button>
    </div>
    <div id="bad" style="display:none">
      <p class="err">Nessun codice ricevuto.</p>
      <p>Riapri il collegamento da ChargeVault e riprova.</p>
    </div>
  </div>
<script>
  var p = new URLSearchParams(location.search);
  var code = p.get('code'), err = p.get('error');
  if (code) {
    document.getElementById('code').textContent = code;
    document.getElementById('ok').style.display = 'block';
  } else {
    document.getElementById('bad').style.display = 'block';
    if (err) document.querySelector('#bad .err').textContent = 'Errore: ' + err;
  }
  function copyCode(){ navigator.clipboard.writeText(code); }
</script>
</body>
</html>
